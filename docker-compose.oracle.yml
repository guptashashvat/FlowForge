services:
  postgres:
    image: postgres:16-alpine
    container_name: flowforge-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-flowforge}
      POSTGRES_USER: ${DB_USER:-flowforge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-this-postgres-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-flowforge} -d ${DB_NAME:-flowforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: flowforge-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-flowforge}
      DB_USER: ${DB_USER:-flowforge}
      DB_PASSWORD: ${DB_PASSWORD:-change-this-postgres-password}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-to-a-long-random-value-before-deploying}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: flowforge-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
